services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenbubble
      POSTGRES_PASSWORD: greenbubble_dev
      POSTGRES_DB: greenbubble
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
